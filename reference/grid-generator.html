<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网格生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f8f8;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-muted: #6b6b6b;
            --accent: #2d2d2d;
            --border: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(0,0,0,0.02) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0,0,0,0.02) 0%, transparent 50%);
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        h1 {
            font-family: 'Space Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .main-content {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 32px;
            align-items: start;
        }

        .controls {
            background: var(--surface);
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 4px 24px var(--shadow);
            border: 1px solid var(--border);
        }

        .control-group {
            margin-bottom: 24px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45, 45, 45, 0.1);
        }

        .range-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        .range-value {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            min-width: 36px;
            text-align: right;
        }

        .btn-download {
            width: 100%;
            padding: 14px 20px;
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-download:active {
            transform: translateY(0);
        }

        .preview {
            background: var(--surface);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 24px var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        #canvas {
            max-width: 100%;
            max-height: 600px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .info {
            margin-top: 32px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .preview {
                min-height: 400px;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Grid Generator</h1>
            <p class="subtitle">生成自定义网格图案 · 导出为图片</p>
        </header>

        <div class="main-content">
            <div class="controls">
                <div class="control-group">
                    <label>单元格比例 (宽:高)</label>
                    <div class="input-row">
                        <input type="number" id="ratioW" value="16" min="1" max="100" placeholder="宽">
                        <input type="number" id="ratioH" value="9" min="1" max="100" placeholder="高">
                    </div>
                </div>

                <div class="control-group">
                    <label>行列设置</label>
                    <div class="input-row">
                        <input type="number" id="rows" value="2" min="1" max="100" placeholder="行">
                        <input type="number" id="cols" value="2" min="1" max="100" placeholder="列">
                    </div>
                </div>

                <div class="control-group">
                    <label>单元格尺寸</label>
                    <div class="range-wrapper">
                        <input type="range" id="cellSize" min="50" max="1000" value="200">
                        <span class="range-value" id="cellSizeValue">200px</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>线条粗细</label>
                    <div class="range-wrapper">
                        <input type="range" id="thickness" min="1" max="20" value="2">
                        <span class="range-value" id="thicknessValue">2px</span>
                    </div>
                </div>

                <div class="control-group">
                    <button class="btn-download" id="downloadBtn">下载图片</button>
                </div>
            </div>

            <div class="preview">
                <canvas id="canvas"></canvas>
            </div>
        </div>

        <div class="info" id="info">
            当前: 16:9 比例 · 2×2 网格 · 2px 线条
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const ratioWInput = document.getElementById('ratioW');
        const ratioHInput = document.getElementById('ratioH');
        const rowsInput = document.getElementById('rows');
        const colsInput = document.getElementById('cols');
        const cellSizeInput = document.getElementById('cellSize');
        const cellSizeValue = document.getElementById('cellSizeValue');
        const thicknessInput = document.getElementById('thickness');
        const thicknessValue = document.getElementById('thicknessValue');
        const downloadBtn = document.getElementById('downloadBtn');
        const info = document.getElementById('info');

        function drawGrid() {
            const ratioW = parseInt(ratioWInput.value) || 16;
            const ratioH = parseInt(ratioHInput.value) || 9;
            const rows = parseInt(rowsInput.value) || 2;
            const cols = parseInt(colsInput.value) || 2;
            const cellSize = parseInt(cellSizeInput.value) || 200;
            const thickness = parseInt(thicknessInput.value) || 2;

            // 根据比例计算单元格的实际宽高（不包含线条）
            const cellWidth = cellSize * (ratioW / ratioH);
            const cellHeight = cellSize;

            // 计算画布尺寸（格子 + 线条）
            // 线条不占用格子空间，是覆盖在上面的
            const canvasWidth = cols * cellWidth;
            const canvasHeight = rows * cellHeight;

            // 设置画布尺寸
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;

            // 白色背景
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            // 黑色线条
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = thickness;

            // 绘制内部垂直线 (不包含最左边和最右边)
            for (let i = 1; i < cols; i++) {
                const x = i * cellWidth;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvasHeight);
                ctx.stroke();
            }

            // 绘制内部水平线 (不包含最上边和最下边)
            for (let i = 1; i < rows; i++) {
                const y = i * cellHeight;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvasWidth, y);
                ctx.stroke();
            }

            // 更新信息显示
            info.textContent = `当前: ${ratioW}:${ratioH} 比例 · ${rows}×${cols} 网格 · ${thickness}px 线条 · ${Math.round(canvasWidth)}×${Math.round(canvasHeight)}px`;
        }

        function downloadImage() {
            const rows = parseInt(rowsInput.value) || 2;
            const cols = parseInt(colsInput.value) || 2;
            const ratioW = parseInt(ratioWInput.value) || 16;
            const ratioH = parseInt(ratioHInput.value) || 9;
            const link = document.createElement('a');
            link.download = `grid-${ratioW}x${ratioH}-${rows}x${cols}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // 事件监听
        ratioWInput.addEventListener('input', drawGrid);
        ratioHInput.addEventListener('input', drawGrid);
        rowsInput.addEventListener('input', drawGrid);
        colsInput.addEventListener('input', drawGrid);
        cellSizeInput.addEventListener('input', () => {
            cellSizeValue.textContent = cellSizeInput.value + 'px';
            drawGrid();
        });
        thicknessInput.addEventListener('input', () => {
            thicknessValue.textContent = thicknessInput.value + 'px';
            drawGrid();
        });
        downloadBtn.addEventListener('click', downloadImage);

        // 初始绘制
        drawGrid();
    </script>
</body>
</html>
