<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Storyboard Copilot</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* 主色调 */
      --bg-primary: #1a1d23;
      --bg-secondary: #22262d;
      --bg-input: #16181d;
      
      /* 强调色 */
      --accent-blue: #4a9eff;
      --accent-blue-hover: #5aabff;
      --accent-blue-glow: rgba(74, 158, 255, 0.3);
      --accent-green: #4ade80;
      --accent-green-dim: rgba(74, 222, 128, 0.15);
      --accent-red: #f87171;
      --accent-red-dim: rgba(248, 113, 113, 0.15);
      --accent-yellow: #fbbf24;
      --accent-yellow-dim: rgba(251, 191, 36, 0.15);
      
      /* 文字 */
      --text-primary: #f0f2f5;
      --text-secondary: #9ca3af;
      --text-tertiary: #6b7280;
      
      /* 边框 */
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-medium: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg-primary);
      min-height: 100vh;
    }

    /* 主容器 */
    .panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 16px;
      min-height: 100vh;
    }

    /* 头部区域 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-blue) 0%, #7c3aed 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      box-shadow: 0 2px 8px rgba(74, 158, 255, 0.3);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .brand-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .brand-subtitle {
      font-size: 10px;
      color: var(--text-secondary);
    }

    /* 连接状态 */
    .connection-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .connection-status.connected {
      background: var(--accent-green-dim);
      color: var(--accent-green);
    }

    .connection-status.disconnected {
      background: var(--accent-red-dim);
      color: var(--accent-red);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* 内容区域 */
    .content {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    /* 区块标题 */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
    }

    /* 输入框 */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
    }

    .input {
      flex: 1;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border-medium);
      border-radius: 6px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px var(--accent-blue-glow);
    }

    .input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 按钮 */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 36px;
      padding: 0 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent-blue);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-blue-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 158, 255, 0.35);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-medium);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .btn-large {
      height: 44px;
      font-size: 13px;
      font-weight: 600;
    }

    /* 选区信息 */
    .selection-info {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 120px;
    }

    .selection-debug {
      margin-bottom: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      background: rgba(74, 158, 255, 0.08);
      border: 1px solid rgba(74, 158, 255, 0.16);
      color: var(--text-secondary);
      font-size: 10px;
      line-height: 1.4;
      word-break: break-word;
    }

    .selection-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 32px 20px;
      color: var(--text-tertiary);
      text-align: center;
      border: 1px dashed var(--border-subtle);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
    }

    .selection-empty-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      opacity: 0.5;
    }

    .selection-empty-text {
      font-size: 12px;
    }

    .selection-data {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .data-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px 12px;
      background: var(--bg-input);
      border-radius: 6px;
      border: 1px solid var(--border-subtle);
    }

    .data-label {
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .data-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .data-value .dim {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .selection-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--accent-yellow-dim);
      border: 1px solid rgba(251, 191, 36, 0.2);
      border-radius: 6px;
      font-size: 11px;
      color: var(--accent-yellow);
    }

    .doc-name {
      grid-column: 1 / -1;
    }

    .doc-name .data-value {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 操作区域 */
    .action-section {
      margin-top: auto;
      padding-top: 8px;
    }

    .action-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-blue) 0%, #7c3aed 100%);
      box-shadow: 0 4px 14px rgba(74, 158, 255, 0.3);
    }

    .action-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--accent-blue-hover) 0%, #8b5cf6 100%);
      box-shadow: 0 6px 20px rgba(74, 158, 255, 0.4);
      transform: translateY(-1px);
    }

    /* 提示信息 */
    .hint {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .hint-icon {
      font-size: 14px;
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* 状态消息 */
    .status-toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      pointer-events: none;
    }

    .status-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .status-toast.success {
      background: var(--accent-green-dim);
      color: var(--accent-green);
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    .status-toast.error {
      background: var(--accent-red-dim);
      color: var(--accent-red);
      border: 1px solid rgba(248, 113, 113, 0.2);
    }

    .status-toast.info {
      background: rgba(74, 158, 255, 0.15);
      color: var(--accent-blue);
      border: 1px solid rgba(74, 158, 255, 0.2);
    }

    /* 响应式 */
    @media (max-width: 300px) {
      .panel {
        padding: 12px;
      }
      
      .selection-data {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <script src="index.js"></script>
  <script src="run.js"></script>
</body>
</html>
