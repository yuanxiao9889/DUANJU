name: Build macOS Package

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos-package:
    name: Build macOS Package
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust (macOS universal target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Resolve macOS packaging mode
        id: mac-mode
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mode="signed"
          for key in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID; do
            if [[ -z "${!key}" ]]; then
              mode="unsigned-test"
              break
            fi
          done

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Using macOS packaging mode: $mode"

      - name: Build bundles
        if: steps.mac-mode.outputs.mode == 'signed'
        env:
          CI: true
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri build --target universal-apple-darwin --bundles dmg

      - name: Build bundles (macOS unsigned test)
        if: steps.mac-mode.outputs.mode == 'unsigned-test'
        shell: bash
        env:
          CI: true
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          unset APPLE_CERTIFICATE
          unset APPLE_CERTIFICATE_PASSWORD
          unset APPLE_SIGNING_IDENTITY
          unset APPLE_ID
          unset APPLE_PASSWORD
          unset APPLE_TEAM_ID
          npx tauri build --target universal-apple-darwin --bundles dmg

      - name: Rename unsigned macOS DMG
        if: steps.mac-mode.outputs.mode == 'unsigned-test'
        shell: bash
        run: |
          dmg="$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -n 1)"
          if [[ -z "$dmg" ]]; then
            echo "No DMG artifact found to rename."
            exit 1
          fi

          dir="$(dirname "$dmg")"
          file="$(basename "$dmg")"
          stem="${file%.dmg}"
          renamed="${dir}/${stem}-unsigned-test.dmg"
          mv "$dmg" "$renamed"
          echo "Renamed macOS test artifact to $(basename "$renamed")"

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ github.sha }}
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
