name: Build Storyboard-Copilot

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (example: v0.1.17)"
        required: true
        type: string
      release_notes:
        description: "Optional release notes override shown on GitHub Release"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      body: ${{ steps.resolve.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release metadata
        id: resolve
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="$INPUT_TAG"
          fi

          if [[ -z "$TAG" || ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"
          NOTES_FILE="docs/releases/${TAG}.md"

          if [[ -n "$INPUT_NOTES" ]]; then
            BODY="$INPUT_NOTES"
          elif [[ -f "$NOTES_FILE" ]]; then
            BODY="$(cat "$NOTES_FILE")"
          else
            BODY="Release ${TAG}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            printf '%s\n' "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-release:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-latest
            args: --bundles nsis
          - name: macOS
            platform: macos-latest
            args: --bundles dmg --target universal-apple-darwin
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust (Windows)
        if: matrix.platform == 'windows-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust (macOS universal target)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Sync app version to release tag
        run: node scripts/sync-version.mjs ${{ needs.prepare-release.outputs.version }}

      - name: Install dependencies
        run: npm ci

      - name: Build and publish bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: 短剧助手 ${{ needs.prepare-release.outputs.tag }}
          releaseBody: ${{ needs.prepare-release.outputs.body }}
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: false
          retryAttempts: 2
          args: ${{ matrix.args }}
