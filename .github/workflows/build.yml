name: Build Storyboard-Copilot

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Update version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF -replace 'refs/tags/v', ''
          $CURRENT = (Get-Content package.json | ConvertFrom-Json).version
          if ($CURRENT -ne $VERSION) {
            npm version $VERSION --no-git-tag-version
          }

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npx tauri build

      - name: Rename Windows installer
        shell: pwsh
        run: |
          $RELEASE_APP_NAME = "Storyboard-Copilot"
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $VERSION = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } else {
            $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          }
          # Rename NSIS installer
          $NSIS_PATH = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if ($NSIS_PATH) {
            $NEW_NAME = "${RELEASE_APP_NAME}_${VERSION}_x64-setup.exe"
            $NEW_PATH = Join-Path (Split-Path $NSIS_PATH.FullName) $NEW_NAME
            Move-Item -Path $NSIS_PATH.FullName -Destination $NEW_PATH -Force
            Write-Host "Renamed to: $NEW_NAME"
          } else {
            throw "No NSIS installer found under src-tauri/target/release/bundle/nsis"
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Update version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            echo "Updating package.json version from $CURRENT to $VERSION"
            npm version "$VERSION" --no-git-tag-version
          else
            echo "package.json already at version $VERSION — skipping npm version"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build application (Universal Binary)
        env:
          CC: ""
          CXX: ""
        run: npx tauri build --target universal-apple-darwin

      - name: Rename macOS DMG
        run: |
          RELEASE_APP_NAME="Storyboard-Copilot"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          DMG_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found under src-tauri/target/universal-apple-darwin/release/bundle/dmg"
            exit 1
          fi
          NEW_NAME="${RELEASE_APP_NAME}_${VERSION}_universal.dmg"
          NEW_PATH="$(dirname "$DMG_PATH")/$NEW_NAME"
          mv "$DMG_PATH" "$NEW_PATH"
          echo "Renamed to: $NEW_NAME"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/macos

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows/*.exe
            artifacts/macos/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: false
